<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Películas - Pagila</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 60%;
      background: white;
    }
    th, td {
      padding: 10px;
      border: 1px solid #ddd;
    }
    th {
      background: #333;
      color: white;
    }
    button {
      padding: 10px 20px;
      margin: 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>🎬 Películas Sitio de Prueba</h1>
  <button onclick="cargarPeliculas()">Cargar películas</button>

  <table id="tabla">
    <thead>
      <tr>
        <th>Título</th>
        <th>Año</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function cargarPeliculas() {
      try {
        const res = await fetch('/peliculas');
        const data = await res.json();

        const tbody = document.querySelector('#tabla tbody');
        tbody.innerHTML = '';

        data.forEach(p => {
          const row = `<tr>
            <td>${p.title}</td>
            <td>${p.release_year}</td>
          </tr>`;
          tbody.innerHTML += row;
        });

      } catch (error) {
        alert('Error: no se pudo conectar con el servidor 😢');
      }
    }
  </script>

</body>
</html>
